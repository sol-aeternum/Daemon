<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daemon Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }
        .header .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.25rem;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
        }
        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
        }
        .message .role {
            font-size: 0.75rem;
            color: #e94560;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .input-container {
            background: #16213e;
            padding: 1rem 2rem;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 1rem;
        }
        .input-container input {
            flex: 1;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            color: #eee;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
        }
        .input-container input:focus {
            outline: none;
            border-color: #e94560;
        }
        .input-container button {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        .input-container button:hover {
            background: #ff6b6b;
        }
        .input-container button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #e94560;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🜁 Daemon Chat</h1>
        <div class="subtitle">OpenAI-compatible API • Multi-Provider • Privacy-Focused</div>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            <div class="role">DAEMON</div>
            <div>Hello! I'm Daemon, your AI assistant. I can route your requests to various LLM providers including Venice AI, OpenRouter, and OpenCode Zen. How can I help you today?</div>
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendButton" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        
        let isStreaming = false;
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isStreaming) {
                sendMessage();
            }
        });
        
        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `<div class="role">${role.toUpperCase()}</div><div>${escapeHtml(content)}</div>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }
        
        function updateMessage(msgDiv, content) {
            msgDiv.querySelector('div:last-child').innerHTML = escapeHtml(content);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/\n/g, '<br>');
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;
            
            isStreaming = true;
            sendButton.disabled = true;
            sendButton.textContent = '...';
            messageInput.value = '';
            
            // Add user message
            addMessage('user', message);
            
            // Add placeholder for assistant response
            const assistantMsg = addMessage('assistant', '');
            let fullContent = '';
            
            try {
                const response = await fetch('http://localhost:8000/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'kimi-k2.5',
                        messages: [{ role: 'user', content: message }],
                        stream: true
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                const parsed = JSON.parse(data);
                                const delta = parsed.choices?.[0]?.delta?.content;
                                if (delta) {
                                    fullContent += delta;
                                    updateMessage(assistantMsg, fullContent);
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }
                
                if (!fullContent) {
                    updateMessage(assistantMsg, '(No response received)');
                }
                
            } catch (error) {
                console.error('Error:', error);
                updateMessage(assistantMsg, `Error: ${error.message}`);
            } finally {
                isStreaming = false;
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
            }
        }
    </script>
</body>
</html>
