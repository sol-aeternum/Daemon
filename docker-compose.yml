services:
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://daemon:daemon@postgres:5432/daemon}
    volumes:
      - .:/app
    command: python scripts/migrate.py
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - daemon-network
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DAEMON_API_KEY=${DAEMON_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - MOCK_LLM=${MOCK_LLM:-false}
      - DATABASE_URL=${DATABASE_URL:-postgresql://daemon:daemon@postgres:5432/daemon}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DAEMON_ENCRYPTION_KEY=${DAEMON_ENCRYPTION_KEY}
    volumes:
      - .:/app
    command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - daemon-network

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DAEMON_API_KEY=${DAEMON_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - MOCK_LLM=${MOCK_LLM:-false}
      - DATABASE_URL=${DATABASE_URL:-postgresql://daemon:daemon@postgres:5432/daemon}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DAEMON_ENCRYPTION_KEY=${DAEMON_ENCRYPTION_KEY}
    volumes:
      - .:/app
    command: python -m orchestrator.worker.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - daemon-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DAEMON_API_KEY=${DAEMON_API_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend
    networks:
      - daemon-network

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-daemon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-daemon}
      - POSTGRES_DB=${POSTGRES_DB:-daemon}
    volumes:
      - daemon_postgres16_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daemon}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - daemon-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - daemon-network

networks:
  daemon-network:
    driver: bridge

volumes:
  daemon_postgres16_data:
  redis_data:
